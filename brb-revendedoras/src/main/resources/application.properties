# ===================================================================
# CONFIGURAÇÕES GERAIS DA APLICAÇÃO
# ===================================================================

spring.application.name=menegati-b2b
spring.main.banner-mode=off

# ===================================================================
# CONEXÃO COM O BANCO DE DADOS (DOCKER MYSQL PORTA 3311)
# ===================================================================

spring.datasource.url=jdbc:mysql://localhost:3311/menegati_b2b?useTimezone=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=admin_menegati
spring.datasource.password=fati1508
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURAÇÕES DO JPA / HIBERNATE
# ===================================================================

# Cria/Atualiza as tabelas automaticamente de acordo com as classes Java
spring.jpa.hibernate.ddl-auto=update
# Dialeto específico para o MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# LOGGING (MONITORAMENTO DO BANCO SEM POLLUÇÃO)
# ===================================================================

logging.level.root=info
# Exibe as queries SQL estruturadas/formatadas no console
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO

# Exibe os valores reais dos parâmetros passados nas queries (Ex: onde tinha '?' mostra o valor)
logging.level.org.hibernate.orm.jdbc.bind=info
# Silencia avisos de depreciação do Hibernate para manter o console limpo
logging.level.org.hibernate.orm.deprecation=error