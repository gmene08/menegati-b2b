<div class="sticky top-0 z-50 hidden h-[var(--header-utility-h)] w-full bg-brand md:flex">
  <div
    class="content-container flex h-full items-center justify-between px-5
           text-[13px] text-white"
  >
    <!-- Esquerda: agendamento -->
    <a
      href="#agendamento"
      class="flex items-center gap-2 tracking-wide transition-opacity hover:opacity-80"
    >
      <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.6"
          d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.242-4.243a8 8 0 1111.314 0z"
        />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.6" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      <span>Agendar atendimento</span>
    </a>

    <!-- Direita: telefone, e-mail e login -->
    <div class="flex h-full items-center gap-5">
      <!-- Telefone -->
      <a
        href="tel:+556799673170"
        aria-label="Ligar para Menegati"
        title="Ligar para Menegati"
        class="flex items-center gap-2 transition-opacity hover:opacity-80"
      >
        <svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.6"
            d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
          />
        </svg>
        <span>+55 67 9967-3170</span>
      </a>

      <!-- Separador -->
      <span class="h-4 w-px bg-white/40" aria-hidden="true"></span>

      <!-- E-mail -->
      <a
        href="mailto:contato@menegati.com.br"
        aria-label="Enviar e-mail para Menegati"
        title="Enviar e-mail"
        class="transition-opacity hover:opacity-80"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.6"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
          />
        </svg>
      </a>

      <!-- Login -->
      <a
        routerLink="/painel-revendedora"
        aria-label="Acessar o painel da revendedora"
        title="Painel da Revendedora"
        class="transition-opacity hover:opacity-80"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.6"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          />
        </svg>
      </a>
    </div>
  </div>
</div>
